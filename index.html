<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lying Bitch Baby Boi v3.0 </title>
    <style>
        /* Reset and Base Styles */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: Arial, sans-serif;
            background-color: #1a1a1a; /* Dark theme to match the image */
            color: white; /* Make text white by default */
        }

        /* The main image container */
        .image-container {
            display: flex;
            justify-content: center; /* Center horizontally */
            align-items: center; /* Center vertically */
            min-height: 70vh; /* Adjust height to provide space for counters below */
            padding-top: 20px;
        }

        .image-container img {
            max-width: 90%; /* leave small margin on small screens */
            height: auto;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); /* adds a drop shadow */
        }

        /* Base styling for both counter areas (flex for centering and spacing) */
        .counter-section {
            text-align: center;
            width: 100%;
            padding: 20px 0 40px 0; /* Space above and below the counters */
            display: flex;
            justify-content: center; /* Center horizontally */
            align-items: center; /* Center vertically */
            gap: 20px; /* space between the two counters */
            position: relative; /* Removes from previous absolute positioning flow */
        }

        .counter-container {
            background: rgba(0, 0, 0, 0.7); /* Translucent black background */
            padding: 15px 30px;
            border-radius: 10px;
            display: inline-block;
            border: 1px solid #444; /* Subtle border */
        }

        /* Styling for the numbers */
        #visitorCounter, #totalViewsCounter {
            font-weight: bold;
            color: #FFD700; /* Gold color to match the mirror frame */
        }

        #visitorCounter {
            font-size: 48px;
        }

        #totalViewsCounter {
            font-size: 36px; /* Slightly smaller than the live counter */
        }
    </style>
</head>
<body>

    <div class="image-container">
        <img src="lyingBitchBabyBoi.png" alt="A detailed, ornate magic mirror on a stone wall with radiating golden tendrils">
    </div>

    <div class="counter-section">
        <div class="counter-container total-counter-container">
            <p>✨ TALES DETECTED (Total):</p>
            <div id="totalViewsCounter">0</div>
        </div>

        <div class="counter-container live-counter-container">
            <p>👥 Visitors Online:</p>
            <div id="visitorCounter">0</div>
        </div>
    </div>

    <script type="module">
        // Import essential Firebase functions
        // We use 'runTransaction' for the total to ensure accuracy.
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getDatabase, ref, push, onDisconnect, onValue, runTransaction } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-analytics.js";

        // Your Firebase configuration (DO NOT SHARE THESE DETAILS PUBLICLY)
        // Copy and paste your ACTUAL config back into this object.
        const firebaseConfig = {
            apiKey: "AIzaSyCokXnEtboNuUIASBMz2ZzS0GuchemoJYI", /* Paste your actual apiKey here */
            authDomain: "lbbb-webcounter.firebaseapp.com",
            projectId: "lbbb-webcounter",
            storageBucket: "lbbb-webcounter.firebasestorage.app",
            messagingSenderId: "217634980859",
            appId: "1:217634980859:web:49ef2b0aa7fe7d0bb1415e",
            measurementId: "G-K6L33E59SJ",
            databaseURL: "https://lbbb-webcounter-default-rtdb.firebaseio.com/"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const db = getDatabase(app);

        // --- SECTION 1: TOTAL VIEWS COUNTER (Cumulative) ---
        const totalViewsRef = ref(db, "totalViewCount");

        // 1. Increment Total Views securely using a TRANSACTION on page load.
        // It checks the CURRENT value and only adds 1 to it.
        runTransaction(totalViewsRef, (currentValue) => {
            // If 'currentValue' doesn't exist yet, start at 1.
            if (currentValue === null || typeof currentValue === 'undefined') {
                return 1;
            }
            
            // Otherwise, add 1 to the existing value.
            const currentCount = Number(currentValue) || 0;
            return currentCount + 1;
        });

        // 2. Display the current Total Views and listen for live updates
        onValue(totalViewsRef, (snapshot) => {
            const count = snapshot.val() || 0; // Use .val() to get the number
            document.getElementById("totalViewsCounter").textContent = count;
        });

        // --- SECTION 2: LIVE VISITOR COUNTER (Connections) ---
        const visitorsConnectedRef = ref(db, "visitorsConnected");
        const connectedRef = ref(db, ".info/connected");

        // Monitor connection status
        onValue(connectedRef, (snapshot) => {
            if (snapshot.val() === true) {
                // We're connected, add this visitor
                const visitorRef = push(visitorsConnectedRef, true);

                // Remove this visitor when they disconnect
                onDisconnect(visitorRef).remove();
            }
        });

        // Listen for live updates to visitor count
        onValue(visitorsConnectedRef, (snapshot) => {
            const count = snapshot.size || 0; // Use .size for number of children
            document.getElementById("visitorCounter").textContent = count;
        });
    </script>
</body>
</html>
