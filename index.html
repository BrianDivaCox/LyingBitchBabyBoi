<!DOCTYPE html>
<html>
<head>
    <title>Live Visitor Counter</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
        }
        #visitorCounter {
            font-size: 48px;
            font-weight: bold;
            color: #007bff;
        }
        .counter-container {
            background: #f0f0f0;
            padding: 30px;
            border-radius: 10px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <h1>Welcome to My Site!</h1>
    <div class="counter-container">
        <p>👥 Visitors Online:</p>
        <div id="visitorCounter">0</div>
    </div>

    <script type="module">
        // Import Firebase functions
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getDatabase, ref, push, onDisconnect, onValue } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-analytics.js";

        // Your Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyCokXnEtboNuUIASBMz2ZzS0GuchemoJYI",
            authDomain: "lbbb-webcounter.firebaseapp.com",
            projectId: "lbbb-webcounter",
            storageBucket: "lbbb-webcounter.firebasestorage.app",
            messagingSenderId: "217634980859",
            appId: "1:217634980859:web:49ef2b0aa7fe7d0bb1415e",
            measurementId: "G-K6L33E59SJ",
            databaseURL: "https://lbbb-webcounter.firebaseio.com"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const db = getDatabase(app);

        // References
        const visitorsConnectedRef = ref(db, "visitorsConnected");
        const connectedRef = ref(db, ".info/connected");

        // Monitor connection status
        onValue(connectedRef, (snapshot) => {
            if (snapshot.val() === true) {
                // We're connected, add this visitor
                const visitorRef = push(visitorsConnectedRef, true);

                // Remove this visitor when they disconnect
                onDisconnect(visitorRef).remove();
            }
        });

        // Listen for live updates to visitor count
        onValue(visitorsConnectedRef, (snapshot) => {
            const count = snapshot.size || 0; // Use .size for number of children
            document.getElementById("visitorCounter").textContent = count;
        });
    </script>
</body>
</html>
</body>
